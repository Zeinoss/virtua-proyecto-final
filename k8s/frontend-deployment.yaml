apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: proyecto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: parcial-frontend:latest
          imagePullPolicy: IfNotPresent   # <-- agregá esta línea
          ports:
            - containerPort: 80
