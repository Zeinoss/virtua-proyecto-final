<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Jugadores - Inicio</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h1 {
        margin-bottom: 30px;
        color: #222;
    }

    button {
        padding: 15px 25px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: #1f6feb;
        color: white;
        cursor: pointer;
        transition: background 0.2s ease;
    }

    button:hover {
        background: #1557bd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenido al Proyecto de Jugadores</h1>
        <button onclick="location.href='registro.html'">Ir a Registro</button>
        <button onclick="location.href='rankings.html'">Ver Rankings</button>
        <button onclick="accederTO()">TO</button>
    </div>
</body>
<script>
function accederTO() {
    const password = prompt("Ingrese la contraseña del TO:");
    if(password === "virtualizacion123") {
        // Contraseña correcta → redirige a to.html
        window.location.href = "to.html";
    } else {
        alert("Contraseña incorrecta");
    }
}
</script>
</html>
